[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "18"

# ── Redirects ──────────────────────────────────────────────────────────────────

# Force HTTPS
[[redirects]]
  from = "http://www.fieldsmotor.ma/*"
  to   = "https://www.fieldsmotor.ma/:splat"
  status = 301
  force  = true

# Non-www → www
[[redirects]]
  from = "https://fieldsmotor.ma/*"
  to   = "https://www.fieldsmotor.ma/:splat"
  status = 301
  force  = true

# Decap CMS admin (SPA)
[[redirects]]
  from = "/admin"
  to   = "/admin/index.html"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to   = "/404.html"
  status = 404

# ── HTTP Headers ───────────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-XSS-Protection          = "1; mode=block"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(self)"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://identity.netlify.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://formspree.io https://api.github.com; frame-src 'none';"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/xml; charset=UTF-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "text/plain; charset=UTF-8"
